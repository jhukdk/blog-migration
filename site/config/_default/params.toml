# Congo theme parameters — see https://jpanther.github.io/congo/docs/configuration/

# Sections shown in recent-articles lists and feeds.
mainSections = ["posts"]

# Appearance — force dark mode for everyone; ignore the visitor's OS preference.
colorScheme = "congo"
defaultAppearance = "dark"
autoSwitchAppearance = false

# Search — requires the JSON home output configured in hugo.toml.
enableSearch = true

# Code blocks — copy-to-clipboard buttons (needs markup highlight.noClasses = false).
enableCodeCopy = true

# SEO niceties.
robots = "index, follow"

[header]
  layout = "basic"

[footer]
  showCopyright = true
  showThemeAttribution = true
  showAppearanceSwitcher = false
  showScrollToTop = true

[homepage]
  layout = "page"          # Homepage renders as a page that lists recent posts.
  homepageImage = ""
  showRecent = true        # Show the recent-articles section.
  showRecentItems = 5
  showMoreLink = true
  showMoreLinkDest = "/posts/"
  cardView = true          # Render the recent-posts list as image cards (thumbnails).

[article]
  showDate = true
  showAuthor = true
  showDateUpdated = false
  showReadingTime = true
  showTableOfContents = true
  showTaxonomies = true
  showPagination = true
  showComments = false

[list]
  showSummary = true
  showTableOfContents = false
  cardView = true          # Render section lists (e.g. /posts/) as image cards.

[author]
  name = "David J. Kim"
  headline = ""
  bio = ""
  links = []
